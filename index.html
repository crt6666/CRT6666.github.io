<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>哈吉米 · 博客</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/data.js"></script>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">哈吉<span>米</span></a>
  <div class="nav-links">
    <a href="index.html" class="active">文章</a>
    <a href="about.html">关于</a>
  </div>
</nav>

<header class="hero">
  <h1>安静地写点东西</h1>
  <p>一个 <span class="tagline-accent">蜂蜜</span>一样甜甜暖暖的小角落 🍯</p>
</header>

<main class="container" id="post-list-container">
  <!-- 动态渲染文章列表 -->
</main>

<footer>
  <p>用 <span class="heart">♥</span> 搭建 · 哈吉米 © 2026</p>
</footer>

<script>
(function() {
  const container = document.getElementById('post-list-container');
  const posts = getAllPosts();

  if (posts.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="emoji">📝</div>
        <h3>还没有文章</h3>
        <p>第一篇正在路上……</p>
      </div>`;
    return;
  }

  let html = '<div class="post-list">';
  posts.forEach(post => {
    html += `
    <article class="post-card" onclick="location.href='post.html?slug=${post.slug}'">
      <div class="post-date">${post.date}</div>
      <h2>${post.title}</h2>
      <p class="post-excerpt">${post.excerpt}</p>
      <div class="post-tags">
        ${post.tags.map(t => `<span>#${t}</span>`).join('')}
      </div>
    </article>`;
  });
  html += '</div>';
  container.innerHTML = html;
})();
</script>

</body>
</html>
